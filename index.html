<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">RETRO ARCADE HUB</h1>
            <p class="subtitle">Choose Your Game</p>
        </header>
        
        <main class="game-grid">
            <div class="game-card">
                <div class="game-icon snake-icon">🂡</div>
                <h2 class="game-title">MEMORY GAME</h2>
                <p class="game-description">Flip over cards and remember which is where!</p>
                <div class="high-score">HIGH SCORE: 2,450</div>
                <a href="memory.html"> <button class="play-button">PLAY NOW</button> </a>
            </div>
            
            <div class="game-card">
                <div class="game-icon tetris-icon">🟢</div>
                <h2 class="game-title">CIRCLE GAME</h2>
                <p class="game-description">Click the circles in the correct order to win!</p>
                <div class="high-score">HIGH SCORE: 15,600</div>
                <a href="circle.html"> <button class="play-button">PLAY NOW</button> </a>
            </div>
        </main>
        
        <footer class="footer">
            <p>© 1987 Retro Arcade Hub | THE BITE!</p>
        </footer>
    </div>
</body>
</html>
